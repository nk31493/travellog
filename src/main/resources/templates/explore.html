<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 탐색 - 트래블로그</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #F5F6F8;
            --bg-card: #ffffff;
            --bg-subtle: #F0F4FF;
            --text-primary: #191F28;
            --text-secondary: #6B7684;
            --text-muted: #B0B8C1;
            --border-color: #E5E8EB;
            --accent: #1B6DFF;
            --accent-hover: #1557D4;
        }
        [data-theme="dark"] {
            --bg-main: #15171C;
            --bg-card: #1E2128;
            --bg-subtle: #1A2740;
            --text-primary: #F0F2F5;
            --text-secondary: #9BA3AF;
            --text-muted: #6B7280;
            --border-color: #2D3139;
            --accent: #4D8DFF;
            --accent-hover: #3D7AEF;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; }
        .nav-bar {
            background: var(--bg-card);
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .brand { font-size: 18px; font-weight: 700; color: var(--accent); text-decoration: none; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 13px; }
        .hero {
            background: linear-gradient(135deg, #1B6DFF 0%, #6FA8FF 100%);
            padding: 40px 24px;
            text-align: center;
            color: white;
        }
        .hero-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .hero-sub { font-size: 14px; opacity: 0.85; margin-bottom: 24px; }
        .search-wrap { display: flex; gap: 8px; max-width: 480px; margin: 0 auto; }
        .search-input { flex: 1; border: none; border-radius: 10px; padding: 12px 16px; font-size: 14px; }
        .search-btn { background: white; color: var(--accent); border: none; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .container-main { max-width: 900px; margin: 0 auto; padding: 28px 20px; }
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-select {
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px;
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
        }
        .route-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .route-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            transition: box-shadow 0.15s;
        }
        .route-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .card-cover {
            background: linear-gradient(135deg, #1B6DFF 0%, #6FA8FF 100%);
            padding: 20px;
            color: white;
            text-decoration: none;
            display: block;
        }
        .card-dest { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
        .card-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .card-date { font-size: 12px; opacity: 0.75; }
        .card-body { padding: 14px 16px; }
        .card-author { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
        .card-pins { font-size: 12px; color: var(--text-secondary); }
        .like-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .like-btn.liked { background: #FFF0F0; border-color: #FFD0D0; color: #FF6B6B; }
        .copy-btn {
            background: var(--bg-subtle);
            border: none;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            color: var(--accent);
        }
        .copy-btn:hover { background: var(--accent); color: white; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        @media (max-width: 600px) {
            .route-grid { grid-template-columns: 1fr; }
            .hero-title { font-size: 20px; }
            .filter-bar { gap: 6px; }
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a class="brand" href="/trips">✈️ 트래블로그</a>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/trips" class="nav-link">← 내 여행</a>
            <a href="/mypage" class="nav-link">👤 마이페이지</a>
            <button onclick="toggleTheme()" id="themeToggleBtn"
                    style="background:none;border:1px solid #E5E8EB;border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;color:#6B7684;">
                🌙
            </button>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-title">🌍 여행 탐색</div>
        <div class="hero-sub">다른 사람들의 여행을 구경하고 복사해봐요</div>
        <form th:action="@{/explore}" method="get" class="search-wrap">
            <input type="text" name="keyword" th:value="${keyword}"
                   placeholder="🔍 도시나 여행 이름으로 검색"
                   class="search-input">
            <button type="submit" class="search-btn">검색</button>
        </form>
    </div>

    <div class="container-main">
        <!-- 필터 바 -->
        <div class="filter-bar">
            <span style="font-size:13px;color:var(--text-secondary);font-weight:600;">정렬:</span>
            <a th:href="@{/explore(sort='latest', destination=${destination})}"
            style="text-decoration:none;border:1.5px solid var(--border-color);border-radius:10px;padding:8px 12px;font-size:13px;background:var(--bg-card);"
            th:style="${sort == null or sort == 'latest'} ? 
                'text-decoration:none;border:1.5px solid var(--accent);border-radius:10px;padding:8px 12px;font-size:13px;background:var(--bg-subtle);color:var(--accent);font-weight:700;' : 
                'text-decoration:none;border:1.5px solid var(--border-color);border-radius:10px;padding:8px 12px;font-size:13px;background:var(--bg-card);color:var(--text-secondary);'">
                최신순
            </a>
            <a th:href="@{/explore(sort='likes', destination=${destination})}"
            th:style="${sort == 'likes'} ? 
                'text-decoration:none;border:1.5px solid var(--accent);border-radius:10px;padding:8px 12px;font-size:13px;background:var(--bg-subtle);color:var(--accent);font-weight:700;' : 
                'text-decoration:none;border:1.5px solid var(--border-color);border-radius:10px;padding:8px 12px;font-size:13px;background:var(--bg-card);color:var(--text-secondary);'">
                인기순
            </a>

            <span style="font-size:13px;color:var(--text-muted);"
                th:text="'총 ' + ${#lists.size(routes)} + '개의 여행'"></span>
        </div>

        <!-- 여행 카드 목록 -->
        <div th:if="${#lists.isEmpty(routes)}" class="empty-state">
            <div style="font-size:48px;margin-bottom:16px;">🗺️</div>
            <div style="font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:8px;">아직 공개된 여행이 없어요</div>
            <div style="font-size:14px;">여행을 공개하면 여기에 표시돼요</div>
        </div>

        <div class="route-grid">
            <div th:each="route : ${routes}" class="route-card">
                <a th:href="@{/explore/{id}(id=${route.id})}"
                    class="card-cover">
                    <div class="card-dest" th:text="${route.destination}"></div>
                    <div class="card-name" th:text="${route.name}"></div>
                    <div class="card-date">
                        📅 <span th:text="${route.startDate}"></span>
                        <span th:if="${route.endDate != null}"> ~ </span>
                        <span th:text="${route.endDate}"></span>
                    </div>
                </a>
                <div class="card-body">
                    <a th:href="@{/user/{id}(id=${route.user.id})}"
                        class="card-author"
                        style="text-decoration:none;color:var(--text-muted);display:block;">
                            👤 <span th:text="${route.user.nickname}"></span>님의 여행
                        </a>
                    <div class="card-footer">
                        <div class="card-pins">
                            📍 <span th:text="${#lists.size(route.pins)}"></span>개의 장소
                        </div>
                        <div style="display:flex;gap:6px;">
                            <button th:id="'like-btn-' + ${route.id}"
                                    th:class="${likedIds.contains(route.id)} ? 'like-btn liked' : 'like-btn'"
                                    th:onclick="'toggleLike(' + ${route.id} + ')'">
                                <span th:text="${likedIds.contains(route.id)} ? '❤️' : '🤍'"></span>
                                <span th:id="'like-count-' + ${route.id}"
                                      th:text="${likeCounts[route.id] ?: 0}"></span>
                            </button>
                            <button class="copy-btn"
                                    th:onclick="'copyRoute(' + ${route.id} + ')'">
                                📋 복사
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/notifications.js"></script>
    <script th:inline="javascript">
        const currentSort = [[${sort}]] || 'latest';
        const currentDestination = [[${destination}]] || '';

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeToggleBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        }
        (function() {
            const saved = localStorage.getItem('theme') || 'light';
            applyTheme(saved);
        })();

        function filterByDestination(dest) {
            const url = new URL(window.location.href);
            url.searchParams.set('destination', dest);
            url.searchParams.set('sort', currentSort);
            window.location.href = url.toString();
        }

        function toggleLike(routeId) {
            fetch(`/api/trips/${routeId}/like`, { method: 'POST' })
                .then(r => {
                    if (r.status === 401) {
                        alert('로그인 후 좋아요를 눌러봐요!');
                        window.location.href = '/login';
                        return;
                    }
                    return r.json();
                })
                .then(data => {
                    if (!data) return;
                    const btn = document.getElementById(`like-btn-${routeId}`);
                    const countEl = document.getElementById(`like-count-${routeId}`);
                    btn.className = data.liked ? 'like-btn liked' : 'like-btn';
                    btn.querySelector('span').textContent = data.liked ? '❤️' : '🤍';
                    countEl.textContent = data.count;
                });
        }

        function copyRoute(routeId) {
            if (!confirm('이 여행 루트를 내 여행으로 복사할까요?')) return;
            fetch(`/api/trips/${routeId}/copy`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    alert('여행이 복사됐어요! 내 여행에서 확인해봐요 😊');
                    window.location.href = `/trips/${data.routeId}`;
                });
        }
    </script>
</body>
</html>
