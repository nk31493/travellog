<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${route.name} + ' - 트래블로그'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #F5F6F8;
            --bg-card: #ffffff;
            --bg-subtle: #F0F4FF;
            --bg-hover: #FAFBFC;
            --text-primary: #191F28;
            --text-secondary: #6B7684;
            --text-muted: #B0B8C1;
            --border-color: #E5E8EB;
            --border-light: #F2F4F6;
            --accent: #1B6DFF;
        }

        [data-theme="dark"] {
            --bg-main: #15171C;
            --bg-card: #1E2128;
            --bg-subtle: #1A2740;
            --bg-hover: #262A33;
            --text-primary: #F0F2F5;
            --text-secondary: #9BA3AF;
            --text-muted: #6B7280;
            --border-color: #2D3139;
            --border-light: #262A33;
            --accent: #4D8DFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-main); font-family: 'Noto Sans KR', sans-serif; }
        .nav-bar {
            background: var(--bg-card);
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand { font-size: 18px; font-weight: 700; color: var(--accent); text-decoration: none; }
        .share-badge {
            background: var(--bg-subtle);
            color: var(--accent);
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        .cover {
            background: linear-gradient(135deg, #1B6DFF 0%, #6FA8FF 100%);
            padding: 32px 24px 24px;
            color: white;
        }
        .cover-dest { font-size: 13px; font-weight: 600; opacity: 0.85; margin-bottom: 6px; }
        .cover-name { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .cover-date { font-size: 13px; opacity: 0.85; }
        .day-tabs-wrap {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0 16px;
            display: flex;
            overflow-x: auto;
            position: sticky;
            top: 57px;
            z-index: 99;
        }
        .day-tab {
            padding: 14px 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }
        .day-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            height: calc(100vh - 140px);
            min-height: 600px;
        }
        .schedule-panel {
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 20px 0;
        }
        .panel-header {
            padding: 0 20px 16px;
            border-bottom: 1px solid var(--border-light);
        }
        .panel-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .pin-list { padding: 12px 0; }
        .pin-item {
            display: flex;
            gap: 12px;
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .pin-item:hover { background: var(--bg-hover); }
        .pin-num {
            width: 26px;
            height: 26px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 4px;
        }
        .pin-info { flex: 1; min-width: 0; }
        .pin-time { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 3px; }
        .pin-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
        .pin-memo { font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .empty-day { text-align: center; padding: 48px 20px; color: var(--text-muted); }
        .map-panel { position: relative; height: 100%; min-height: 600px; }
        #shareMap { width: 100%; height: 100%; min-height: 600px; }
        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; height: auto; }
            .map-panel { height: 400px; }
            .schedule-panel { height: auto; max-height: 500px; }
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a class="brand" href="/">✈️ 트래블로그</a>
        <div style="display:flex;align-items:center;gap:10px;">
            <button onclick="toggleTheme()" id="themeToggleBtn"
                    style="background:none;border:1px solid #E5E8EB;border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;color:#6B7684;">
                🌙
            </button>
            <span class="share-badge">🔗 공유된 여행</span>
        </div>
    </nav>

    <div class="cover">
        <div class="cover-dest" th:text="'📍 ' + ${route.destination}"></div>
        <div class="cover-name" th:text="${route.name}"></div>
        <div class="cover-date">
            📅 <span th:text="${route.startDate}"></span>
            <span th:if="${route.endDate != null}"> ~ <span th:text="${route.endDate}"></span></span>
        </div>
    </div>

    <div class="day-tabs-wrap" id="dayTabs"></div>

    <div class="main-layout">
        <div class="schedule-panel">
            <div class="panel-header">
                <div class="panel-title" id="panelTitle">일정</div>
            </div>
            <div class="pin-list" id="pinList">
                <div class="empty-day">로딩 중...</div>
            </div>
        </div>
        <div class="map-panel">
            <div id="shareMap"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const shareToken = /*[[${shareToken}]]*/ '';
        const routeStartDate = [[${route.startDate}]];
        const routeEndDate = [[${route.endDate}]];

        let shareMap;
        let groupedPins = {};
        let currentDate = null;
        let mapMarkers = [];
        let mapPolyline = null;

        function initMap() {
            shareMap = new google.maps.Map(document.getElementById('shareMap'), {
                center: { lat: 36.5, lng: 127.5 },
                zoom: 7,
                styles: [{ featureType: 'poi', stylers: [{ visibility: 'off' }] }]
            });
            loadPins();
        }

        function loadPins() {
            fetch(`/api/share/${shareToken}/pins`)
                .then(r => r.json())
                .then(pins => {
                    groupPins(pins);
                    renderDayTabs();
                    if (Object.keys(groupedPins).length > 0 && !currentDate) {
                        currentDate = Object.keys(groupedPins).sort()[0];
                    }
                    renderPinList();
                    renderMap();
                });
        }

        function groupPins(pins) {
            groupedPins = {};
            if (routeStartDate && routeEndDate) {
                let d = new Date(routeStartDate);
                const end = new Date(routeEndDate);
                while (d <= end) {
                    const key = d.toISOString().split('T')[0];
                    groupedPins[key] = [];
                    d.setDate(d.getDate() + 1);
                }
            }
            pins.forEach(pin => {
                if (!groupedPins[pin.visitDate]) groupedPins[pin.visitDate] = [];
                groupedPins[pin.visitDate].push(pin);
            });
        }

        function renderDayTabs() {
            const dates = Object.keys(groupedPins).sort();
            document.getElementById('dayTabs').innerHTML = dates.map((date, idx) => {
                const d = new Date(date);
                const label = `${d.getMonth()+1}/${d.getDate()}`;
                const isActive = date === currentDate ? 'active' : '';
                return `<div class="day-tab ${isActive}" onclick="selectDay('${date}')">
                    Day ${idx+1} <span style="font-size:11px;opacity:0.7;">${label}</span>
                </div>`;
            }).join('');
        }

        function selectDay(date) {
            currentDate = date;
            renderDayTabs();
            renderPinList();
            renderMap();
        }

        function renderPinList() {
            const pins = groupedPins[currentDate] || [];
            document.getElementById('panelTitle').textContent = currentDate;

            if (pins.length === 0) {
                document.getElementById('pinList').innerHTML = `
                    <div class="empty-day">
                        <div style="font-size:36px;margin-bottom:12px;">📍</div>
                        <div style="font-size:14px;">아직 추가된 장소가 없어요</div>
                    </div>`;
                return;
            }

            let html = '';
            pins.forEach((pin, idx) => {
                const time = pin.visitTime
                    ? `<div class="pin-time">🕐 ${pin.visitTime.substring(0,5)}</div>` : '';
                const memo = pin.memo
                    ? `<div class="pin-memo">${pin.memo}</div>`
                    : `<div class="pin-memo" style="color:var(--text-muted);">메모 없음</div>`;
                html += `
                    <div class="pin-item" data-pin-id="${pin.pinId}"
                        onclick="focusPin(${pin.latitude}, ${pin.longitude})">
                        <div class="pin-num">${idx+1}</div>
                        <div class="pin-info">
                            ${time}
                            <div class="pin-name">${pin.title}</div>
                            ${memo}
                            <div id="photos-${pin.pinId}" style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;"></div>
                        </div>
                    </div>`;
            });
            document.getElementById('pinList').innerHTML = html;

            // 각 핀의 사진 로딩
            pins.forEach(pin => {
                fetch(`/api/pins/${pin.pinId}/photos/public`)
                    .then(r => r.json())
                    .then(photos => {
                        if (photos.length === 0) return;
                        document.getElementById(`photos-${pin.pinId}`).innerHTML = photos.map(p => `
                            <img src="${p.filePath}"
                                onclick="event.stopPropagation();openPhotoViewer('${p.filePath}')"
                                style="width:48px;height:48px;object-fit:cover;border-radius:6px;cursor:pointer;${p.representative ? 'outline:2px solid #1B6DFF;' : ''}">
                        `).join('');
                    })
                    .catch(() => {});
            });
        }

        function openPhotoViewer(filePath) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;';
            overlay.innerHTML = `<img src="${filePath}" style="max-width:90%;max-height:90%;border-radius:8px;">`;
            overlay.onclick = () => document.body.removeChild(overlay);
            document.body.appendChild(overlay);
        }

        function renderMap() {
            mapMarkers.forEach(m => m.setMap(null));
            mapMarkers = [];
            if (mapPolyline) mapPolyline.setMap(null);

            google.maps.event.trigger(shareMap, 'resize');

            const pins = groupedPins[currentDate] || [];
            if (pins.length === 0) return;

            const bounds = new google.maps.LatLngBounds();
            const path = [];

            pins.forEach((pin, idx) => {
                const pos = { lat: pin.latitude, lng: pin.longitude };
                path.push(pos);
                bounds.extend(pos);

                const marker = new google.maps.Marker({
                    map: shareMap,
                    position: pos,
                    label: { text: String(idx+1), color: 'white', fontWeight: 'bold', fontSize: '12px' },
                    title: pin.title
                });
                mapMarkers.push(marker);
            });

            if (pins.length > 1) {
                mapPolyline = new google.maps.Polyline({
                    path,
                    geodesic: true,
                    strokeColor: '#1B6DFF',
                    strokeOpacity: 0.8,
                    strokeWeight: 3,
                    map: shareMap
                });
                shareMap.fitBounds(bounds, 80);
            } else {
                shareMap.setCenter({ lat: pins[0].latitude, lng: pins[0].longitude });
                shareMap.setZoom(14);
            }
        }

        function focusPin(lat, lng) {
            shareMap.panTo({ lat, lng });
            shareMap.setZoom(15);
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeToggleBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        }

        (function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            applyTheme(saved);
        })();
    </script>
    <script th:src="@{'https://maps.googleapis.com/maps/api/js?key=' + ${googleMapsKey} + '&callback=initMap&loading=async'}" async></script>
</body>
</html>
