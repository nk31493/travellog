<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${profileUser.nickname} + '님의 프로필 - 트래블로그'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #F5F6F8;
            --bg-card: #ffffff;
            --bg-subtle: #F0F4FF;
            --text-primary: #191F28;
            --text-secondary: #6B7684;
            --text-muted: #B0B8C1;
            --border-color: #E5E8EB;
            --accent: #1B6DFF;
            --accent-hover: #1557D4;
        }
        [data-theme="dark"] {
            --bg-main: #15171C;
            --bg-card: #1E2128;
            --bg-subtle: #1A2740;
            --text-primary: #F0F2F5;
            --text-secondary: #9BA3AF;
            --text-muted: #6B7280;
            --border-color: #2D3139;
            --accent: #4D8DFF;
            --accent-hover: #3D7AEF;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; }
        .nav-bar {
            background: var(--bg-card);
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .brand { font-size: 18px; font-weight: 700; color: var(--accent); text-decoration: none; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 13px; }
        .profile-header {
            background: linear-gradient(135deg, #1B6DFF 0%, #6FA8FF 100%);
            padding: 40px 24px;
            text-align: center;
            color: white;
        }
        .avatar {
            width: 72px;
            height: 72px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
        }
        .profile-name { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .profile-stat { font-size: 13px; opacity: 0.85; }
        .container-main { max-width: 900px; margin: 0 auto; padding: 28px 20px; }
        .section-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; }
        .route-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .route-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            display: block;
            transition: box-shadow 0.15s;
        }
        .route-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .card-cover {
            background: linear-gradient(135deg, #1B6DFF 0%, #6FA8FF 100%);
            padding: 20px;
            color: white;
        }
        .card-dest { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
        .card-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .card-date { font-size: 12px; opacity: 0.75; }
        .card-body { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .card-pins { font-size: 12px; color: var(--text-secondary); }
        .card-likes { font-size: 12px; color: #FF6B6B; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        @media (max-width: 600px) {
            .route-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a class="brand" href="/trips">✈️ 트래블로그</a>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/explore" class="nav-link">🌍 탐색</a>
            <a href="/trips" class="nav-link">내 여행</a>
            <button onclick="toggleTheme()" id="themeToggleBtn"
                    style="background:none;border:1px solid #E5E8EB;border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;color:#6B7684;">
                🌙
            </button>
        </div>
    </nav>

    <div class="profile-header">
        <div class="avatar">👤</div>
        <div class="profile-name" th:text="${profileUser.nickname}"></div>
        <div class="profile-stat" th:text="'공개된 여행 ' + ${#lists.size(routes)} + '개'"></div>
    </div>

    <div class="container-main">
        <div class="section-title" th:text="${profileUser.nickname} + '님의 여행'"></div>

        <div th:if="${#lists.isEmpty(routes)}" class="empty-state">
            <div style="font-size:48px;margin-bottom:16px;">🗺️</div>
            <div th:text="${isMe} ? '아직 공개한 여행이 없어요' : '아직 공개된 여행이 없어요'"></div>
        </div>

        <div class="route-grid">
            <a th:each="route : ${routes}"
               th:href="@{/explore/{id}(id=${route.id})}"
               class="route-card">
                <div class="card-cover">
                    <div class="card-dest" th:text="${route.destination}"></div>
                    <div class="card-name" th:text="${route.name}"></div>
                    <div class="card-date">
                        📅 <span th:text="${route.startDate}"></span>
                        <span th:if="${route.endDate != null}"> ~ </span>
                        <span th:text="${route.endDate}"></span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-pins">📍 <span th:text="${#lists.size(route.pins)}"></span>개의 장소</div>
                    <div class="card-likes">❤️ <span th:text="${likeCounts[route.id] ?: 0}"></span></div>
                </div>
            </a>
        </div>
    </div>

    <script src="/js/notifications.js"></script>
    <script>
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeToggleBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        }
        (function() {
            const saved = localStorage.getItem('theme') || 'light';
            applyTheme(saved);
        })();
    </script>
</body>
</html>
